name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FOUNDRY_PROFILE: default

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Foundry
        uses: actions/cache@v4
        with:
          path: ~/.foundry
          key: foundry-${{ runner.os }}-${{ hashFiles('foundry.toml') }}
          restore-keys: |
            foundry-${{ runner.os }}-

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: forge install

      - name: Compile
        run: forge build --sizes

      - name: Run tests
        run: forge test -vvv

      - name: Run coverage
        run: |
          COVERAGE_OUT=$(forge coverage --report summary 2>&1)
          echo "$COVERAGE_OUT"
          COVERAGE=$(echo "$COVERAGE_OUT" | grep -E "^\|.*Total" | tail -1 | awk -F'|' '{gsub(/ /,"",$4); gsub(/%/,"",$4); print $4}')
          echo "Extracted line coverage: $COVERAGE%"
          if [ -z "$COVERAGE" ]; then
            echo "::warning::Could not extract coverage number, skipping threshold check"
          elif (( $(echo "$COVERAGE < 90" | bc -l) )); then
            echo "::error::Line coverage ($COVERAGE%) is below 90%"
            exit 1
          fi

      - name: Check formatting
        run: forge fmt --check

  slither:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: forge install

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          fail-on: none
          slither-args: --filter-paths "test/|lib/|src/vulnerable/" --exclude-informational --exclude-dependencies