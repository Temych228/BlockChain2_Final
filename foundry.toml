[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
gas_reports = ["*"]
fs_permissions = [{ access = "read", path = "./"}]

[fuzz]
runs = 256

[invariant]
runs = 256
depth = 15

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
